<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel · HTML Yönetimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:400,500,600,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            background: #080b14;
            padding: 2rem 1.5rem;
            color: #f1f5f9;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2.5rem 2.8rem 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(60, 140, 255, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2.8rem;
            position: relative;
            z-index: 1;
        }
        .header-left h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f0f4ff 0%, #7bb3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left .sub {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .file-count {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.03);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .menu-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }
        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        .menu-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }
        .menu-dropdown {
            position: absolute;
            top: 70px;
            right: 0;
            background: rgba(12, 16, 30, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 1.2rem;
            padding: 0.6rem;
            min-width: 180px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 100;
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-dropdown button {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            padding: 0.75rem 1.2rem;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.8rem;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .menu-dropdown button:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .menu-dropdown .logout-btn {
            color: #f87171;
        }
        .menu-dropdown .logout-btn:hover {
            background: rgba(248, 113, 113, 0.08);
            color: #fca5a5;
        }
        .status {
            padding: 0.9rem 1.4rem;
            border-radius: 1rem;
            margin-bottom: 1.8rem;
            display: none;
            font-weight: 500;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }
        .status.success {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(52, 211, 153, 0.06);
            border: 1px solid rgba(52, 211, 153, 0.12);
            color: #6ee7b7;
        }
        .status.error {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(248, 113, 113, 0.06);
            border: 1px solid rgba(248, 113, 113, 0.12);
            color: #fca5a5;
        }
        .action-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2.8rem;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }
        .action-bar input {
            flex: 2 1 320px;
            padding: 0.85rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            transition: 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .action-bar input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .action-bar input:focus {
            border-color: rgba(60, 140, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }
        .action-bar .btn-group {
            display: flex;
            gap: 0.8rem;
            flex: 1 1 auto;
        }
        .action-bar .btn-group .btn {
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }
        .btn {
            padding: 0.85rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #e8edf5;
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-1px);
        }
        .btn-primary {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.15);
            color: #93bbfc;
        }
        .btn-primary:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            position: relative;
            z-index: 1;
        }
        .glass-card {
            position: relative;
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.6rem 1.6rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.025);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0%, rgba(255, 255, 255, 0.015) 10%, rgba(255, 255, 255, 0.04) 25%, rgba(255, 255, 255, 0.015) 40%, transparent 60%);
            animation: shimmerRotate 14s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes shimmerRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card-name {
            font-size: 1.2rem;
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }
        .card-spacer {
            flex: 1;
            min-height: 0.5rem;
        }
        .card-actions {
            display: flex;
            gap: 2rem;
            margin-top: auto;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            justify-content: center;
            align-items: center;
        }
        .card-actions button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: 0.2s;
            padding: 0.2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-actions button svg {
            width: 26px;
            height: 26px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: 0.2s;
        }
        .card-actions button:hover {
            color: rgba(255, 255, 255, 0.5);
        }
        .card-actions .view-btn:hover { color: #93bbfc; }
        .card-actions .edit-btn:hover { color: #60a5fa; }
        .card-actions .copy-btn:hover { color: #6ee7b7; }
        .card-actions .delete-btn:hover { color: #f87171; }
        .loading {
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            padding: 4rem;
            grid-column: 1 / -1;
            font-weight: 400;
            font-size: 0.95rem;
        }

        /* ─── MODAL (POPUP) ─── */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1.5rem;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: rgba(10, 14, 28, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 2rem;
            padding: 2.2rem;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }
        .modal-content h2 {
            font-size: 1.4rem;
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 1.5rem;
        }
        .modal-content label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 1.2rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .modal-content input:focus,
        .modal-content textarea:focus {
            border-color: rgba(60, 140, 255, 0.15);
            background: rgba(255, 255, 255, 0.035);
        }
        .modal-content textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .modal-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem 1.2rem 2.5rem; border-radius: 1.8rem; }
            .header { flex-direction: column; gap: 1.2rem; align-items: stretch; }
            .header-right { justify-content: space-between; }
            .action-bar { flex-direction: column; }
            .action-bar .btn-group { flex: 1 1 auto; }
            .card-grid { grid-template-columns: 1fr; }
            .card-actions { gap: 1.8rem; }
            .card-actions button svg { width: 22px; height: 22px; }
            .modal-content { padding: 1.5rem; }
        }
        @media (max-width: 480px) {
            .container { padding: 1rem 0.8rem 1.8rem; }
            .btn { padding: 0.7rem 1.2rem; font-size: 0.8rem; }
            .header-left h1 { font-size: 1.6rem; }
            .card-actions { gap: 1.4rem; }
            .card-actions button svg { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📁 HTML Yönetimi</h1>
                <div class="sub">darknessite.vercel.app · GitHub ile senkron</div>
            </div>
            <div class="header-right">
                <span class="file-count" id="fileCount">0 dosya</span>
                <div style="position:relative;">
                    <button class="menu-btn" onclick="toggleMenu()">
                        <span></span><span></span><span></span>
                    </button>
                    <div class="menu-dropdown" id="menuDropdown">
                        <button onclick="window.location.reload()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                            Yenile
                        </button>
                        <button onclick="logout()" class="logout-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Çıkış Yap
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div class="action-bar">
            <input type="text" id="fileNameInput" placeholder="Yeni dosya adı (örn: about, projeler)" />
            <div class="btn-group">
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Ekle
                </button>
                <button class="btn" onclick="loadFiles()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Yenile
                </button>
            </div>
        </div>

        <div id="fileGrid" class="card-grid">
            <div class="loading">⏳ Dosyalar yükleniyor...</div>
        </div>
    </div>

    <!-- ─── EKLEME POPUP ─── -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2>➕ Yeni HTML Dosyası</h2>
            <label>Dosya Adı</label>
            <input type="text" id="createFileName" placeholder="örn: about, projeler, iletisim" />
            <label>HTML Kodu</label>
            <textarea id="createFileContent" placeholder="<!DOCTYPE html>..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="createFileFromModal()">✅ Tamam</button>
                <button class="btn" onclick="closeCreateModal()">İptal</button>
            </div>
        </div>
    </div>

    <!-- ─── DÜZENLEME POPUP ─── -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Dosyayı Düzenle</h2>
            <label>Dosya Adı</label>
            <input type="text" id="editFileName" />
            <label>HTML Kodu</label>
            <textarea id="editFileContent"></textarea>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveEdit()">💾 Kaydet</button>
                <button class="btn" onclick="closeEditModal()">İptal</button>
            </div>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════
        //  🔐 KENDİ BİLGİLERİNİZLE DOLDURUN
        // ══════════════════════════════════════════════
        const CONFIG = {
            GITHUB_TOKEN: 'github_pat_11BC2EAYQ0aELf3WP5Xj1i_Zn1aeHnTvE0y3a1C5W2n3X7f8g9h0i1j2k3l4m5n6o7p',
            REPO_OWNER: 'darkneslord19',
            REPO_NAME: 'depo',
            BRANCH: 'main',
            BASE_URL: 'https://darknessite.vercel.app'
        };

        // ─── MENU ────────────────────────────────────
        function toggleMenu() {
            document.getElementById('menuDropdown').classList.toggle('show');
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('menuDropdown');
            const btn = document.querySelector('.menu-btn');
            if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('show');
            }
        });

        function logout() {
            if (confirm('Çıkış yapmak istediğinize emin misiniz?')) {
                window.location.href = 'https://darknessite.vercel.app';
            }
        }

        // ─── STATUS ──────────────────────────────────
        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.innerHTML = message;
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => { el.className = 'status'; }, 5000);
        }

        // ─── LOAD FILES ─────────────────────────────
        async function loadFiles() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '<div class="loading">⏳ Yükleniyor...</div>';

            try {
                const url = `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents`;
                const res = await fetch(url, {
                    headers: {
                        'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const files = await res.json();
                const htmlFiles = files.filter(f =>
                    f.name.endsWith('.html') && f.name !== 'admin.html'
                );

                document.getElementById('fileCount').textContent = htmlFiles.length + ' dosya';

                if (htmlFiles.length === 0) {
                    grid.innerHTML = '<div class="loading">📭 Henüz HTML dosyası yok.</div>';
                    return;
                }

                grid.innerHTML = '';
                htmlFiles.forEach(file => {
                    const nameWithoutExt = file.name.replace(/\.html$/, '');
                    const fullUrl = `${CONFIG.BASE_URL}/${nameWithoutExt}.html`;

                    const card = document.createElement('div');
                    card.className = 'glass-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <div class="card-name">${nameWithoutExt}</div>
                            <div class="card-spacer"></div>
                            <div class="card-actions">
                                <button class="view-btn" onclick="viewFile('${file.name}')" title="Görüntüle">
                                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                                <button class="edit-btn" onclick="openEditModal('${file.sha}','${file.name}')" title="Düzenle">
                                    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                </button>
                                <button class="copy-btn" onclick="copyLink('${fullUrl}')" title="Kopyala">
                                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                </button>
                                <button class="delete-btn" onclick="deleteFile('${file.sha}','${file.name}')" title="Sil">
                                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                grid.innerHTML = `<div class="loading">❌ Hata: ${err.message}</div>`;
                showStatus('error', 'Dosyalar yüklenemedi: ' + err.message);
            }
        }

        // ─── CREATE MODAL ────────────────────────────
        function openCreateModal() {
            document.getElementById('createFileName').value = '';
            document.getElementById('createFileContent').value = `<!DOCTYPE html>
        <html lang="tr">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Sayfa Başlığı</title>
        </head>
        <body>
            <h1>Merhaba Dünya!</h1>
        </body>
        </html>`;
            document.getElementById('createModal').classList.add('show');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        async function createFileFromModal() {
            const nameInput = document.getElementById('createFileName');
            const contentInput = document.getElementById('createFileContent');
            let name = nameInput.value.trim();
            const content = contentInput.value;

            if (!name) {
                showStatus('error', 'Lütfen dosya adı girin!');
                return;
            }
            if (!content.trim()) {
                showStatus('error', 'Lütfen HTML kodu girin!');
                return;
            }
            if (!name.endsWith('.html')) name += '.html';

            try {
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${name}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Create ${name}`,
                            content: btoa(unescape(encodeURIComponent(content))),
                            branch: CONFIG.BRANCH
                        })
                    }
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                closeCreateModal();
                showStatus('success', `✅ ${name} oluşturuldu!`);
                loadFiles();
            } catch (err) {
                showStatus('error', '❌ Oluşturulamadı: ' + err.message);
            }
        }

        // ─── VIEW ────────────────────────────────────
        async function viewFile(fileName) {
            try {
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${fileName}`,
                    { headers: { 'Authorization': `token ${CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } }
                );
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const win = window.open('', '_blank');
                win.document.write(content);
                win.document.close();
            } catch (err) {
                showStatus('error', 'Dosya okunamadı: ' + err.message);
            }
        }

        // ─── EDIT MODAL ──────────────────────────────
        let currentEditSha = '';
        let currentEditName = '';

        async function openEditModal(sha, fileName) {
            try {
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${fileName}`,
                    { headers: { 'Authorization': `token ${CONFIG.GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } }
                );
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));

                currentEditSha = sha;
                currentEditName = fileName;
                document.getElementById('editFileName').value = fileName;
                document.getElementById('editFileContent').value = content;
                document.getElementById('editModal').classList.add('show');
            } catch (err) {
                showStatus('error', 'Dosya okunamadı: ' + err.message);
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        async function saveEdit() {
            const content = document.getElementById('editFileContent').value;
            const fileName = document.getElementById('editFileName').value;
            if (!content.trim()) {
                showStatus('error', 'İçerik boş olamaz!');
                return;
            }
            try {
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${fileName}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update ${fileName}`,
                            content: btoa(unescape(encodeURIComponent(content))),
                            sha: currentEditSha,
                            branch: CONFIG.BRANCH
                        })
                    }
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                closeEditModal();
                showStatus('success', `✅ ${fileName} güncellendi!`);
                loadFiles();
            } catch (err) {
                showStatus('error', '❌ Güncellenemedi: ' + err.message);
            }
        }

        // ─── DELETE ──────────────────────────────────
        async function deleteFile(sha, fileName) {
            if (!confirm(`"${fileName}" dosyasını silmek istediğinize emin misiniz?`)) return;
            try {
                const res = await fetch(
                    `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${fileName}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${fileName}`,
                            sha: sha,
                            branch: CONFIG.BRANCH
                        })
                    }
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                showStatus('success', `✅ ${fileName} silindi!`);
                loadFiles();
            } catch (err) {
                showStatus('error', '❌ Silinemedi: ' + err.message);
            }
        }

        // ─── COPY ────────────────────────────────────
        function copyLink(url) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    showStatus('success', '✅ Link kopyalandı: ' + url);
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showStatus('success', '✅ Link kopyalandı: ' + text);
            } catch (err) {
                prompt('Linki kopyala:', text);
            }
            document.body.removeChild(textarea);
        }

        // ─── KEYBOARD ─────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCreateModal();
                closeEditModal();
            }
        });

        // ─── INIT ────────────────────────────────────
        loadFiles();
    </script>
</body>
</html>
