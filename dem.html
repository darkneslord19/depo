<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AES-CBC Şifreleyici</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .output-box { margin-top: 20px; padding: 15px; background: #34495e; color: #ecf0f1; border-radius: 8px; word-break: break-all; min-height: 80px; font-family: monospace; cursor: pointer; border: 2px dashed #95a5a6; }
        .info { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>AES-CBC Şifreleyici</h2>
    <input type="text" id="key" value="1234567890ABCDEF" placeholder="16 Karakter Anahtar">
    <textarea id="input" rows="5" placeholder="Şifrelenecek metni girin..."></textarea>
    <button onclick="process()">Şifrele ve Hazırla</button>
    
    <div class="output-box" id="result" onclick="copy()">Sonuç buraya gelecek...</div>
    <p class="info">Çıktıya dokunarak kopyalayabilirsin.</p>
</div>

<script>
    function process() {
        const text = document.getElementById('input').value;
        const keyStr = document.getElementById('key').value;
        
        // 1. Anahtar: Her zaman 16 bayt (AES-128)
        const key = CryptoJS.enc.Utf8.parse(keyStr.padEnd(16, '\0').substring(0, 16));
        
        // 2. IV: Rastgele 16 bayt
        const iv = CryptoJS.lib.WordArray.random(16);
        
        // 3. Şifrele
        const encrypted = CryptoJS.AES.encrypt(text, key, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
        });

        // 4. Birleştir: IV (16) + Ciphertext (N)
        const combined = iv.concat(encrypted.ciphertext);
        const finalBase64 = CryptoJS.enc.Base64.stringify(combined);
        
        document.getElementById('result').innerText = finalBase64;
    }

    function copy() {
        const text = document.getElementById('result').innerText;
        if(text !== "Sonuç buraya gelecek...") {
            navigator.clipboard.writeText(text);
            alert("Base64 verisi kopyalandı! logo.png dosyasının sonuna >>>D<<< işaretinden sonra yapıştırın.");
        }
    }
</script>
</body>
</html>
